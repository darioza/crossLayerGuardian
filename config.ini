# CrossLayerGuardian Configuration File
# Configuration for eBPF-based cross-layer correlation with ML ensemble
# Based on dissertation specifications for sub-10µs correlation and real-time ML classification

[SYSTEM]
# System-level configuration
log_level = INFO
max_events_per_second = 50000
enable_tsc_sync = true
tsc_sync_precision_us = 2.3
enable_performance_monitoring = true

[EBPF]
# eBPF program configuration
network_program = net_monitor.bpf.c
file_program = file_monitor.bpf.c
enable_xdp = true
enable_kprobes = true
ring_buffer_size = 8388608  # 8MB
max_entries = 100000

[CORRELATION]
# Event correlation parameters
min_correlation_score = 0.3
temporal_window_ms = 100
spatial_correlation_enabled = true
pid_flow_mapping_enabled = true
correlation_timeout_us = 10
adaptive_windows_enabled = true
initial_window_size_ms = 20
max_window_size_ms = 200
min_window_size_ms = 5

[MONITORING]
# Advanced monitoring configuration
enable_advanced_monitor = true
anomaly_detection_enabled = true
adaptive_tuning_enabled = true
alert_threshold = 0.75
performance_window_seconds = 300
cpu_threshold_percent = 80
memory_threshold_mb = 1000
correlation_rate_threshold = 1000

# ===========================================
# MACHINE LEARNING CONFIGURATION - PHASE 3
# ===========================================

[ML_ENSEMBLE]
# Two-stage ensemble system configuration
ensemble_alpha = 0.3
confidence_threshold = 0.7
decision_strategy = confidence_weighted
agreement_threshold = 0.8
min_samples_for_update = 100
enable_weight_adaptation = true
fallback_strategy = conservative

[ML_XGBOOST]
# XGBoost classifier parameters (first stage)
max_depth = 6
learning_rate = 0.1
n_estimators = 50
subsample = 0.8
colsample_bytree = 0.8
reg_alpha = 0.1
reg_lambda = 1.0
random_state = 42

[ML_MLP]
# Multi-Layer Perceptron parameters (second stage)
hidden_layers = 256,128,64
activation = relu
learning_rate = 0.001
batch_size = 32
epochs = 100
patience = 15
dropout_rate = 0.3
l2_regularization = 0.001
validation_split = 0.2

[ML_FEATURE_EXTRACTION]
# Feature extraction parameters (127 dimensions)
temporal_window_seconds = 60.0
spatial_window_events = 1000
min_correlation_score = 0.3
auto_extract_features = true
feature_cache_size = 10000

# Feature dimensions breakdown:
# - Temporal features: 42 dimensions
# - Spatial features: 35 dimensions  
# - Behavioral features: 50 dimensions
# Total: 127 dimensions

[ML_INTEGRATION]
# Real-time ML integration parameters
enable_realtime_classification = true
batch_size = 32
max_queue_size = 1000
workers = 2
alert_threshold = 0.7
enable_batching = true
batch_timeout_seconds = 1.0
adaptive_batching = true
processing_timeout_seconds = 5.0
performance_monitor = true

[ML_TRAINING]
# Training pipeline configuration
test_size = 0.2
val_size = 0.2
cv_folds = 5
stratify = true
handle_imbalanced = true
feature_selection = false
feature_selection_k = 100
hyperparameter_tuning = false
cross_validation = true
save_models = true
generate_reports = true

[ML_PATHS]
# Model and data paths
model_dir = models
data_dir = data
report_dir = reports
alert_log_file = alerts.log
training_log_file = training.log

[ML_PERFORMANCE]
# Performance targets from dissertation
target_throughput_mbps = 850
max_cpu_overhead_percent = 8
max_memory_overhead_mb = 100
target_latency_us = 10
correlation_precision_us = 2.3
max_prediction_time_ms = 50

[ALERTS]
# Alert system configuration
enable_ml_alerts = true
alert_confidence_threshold = 0.7
alert_log_file = alerts.log
max_alerts_per_minute = 100
alert_cooldown_seconds = 5
enable_email_alerts = false
enable_syslog_alerts = true

[EXPERIMENTAL]
# Experimental features for dissertation validation
enable_performance_profiling = false
enable_detailed_metrics = false
enable_correlation_tracing = false
benchmark_mode = false
validation_dataset_path = 
cicids2018_dataset_path = 
performance_log_file = performance.log